<style>

            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        .glow-border {
            position: relative;
        }
        .glow-border::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 81, 0, 0.4), rgba(255, 81, 0, 0.1), rgba(179, 179, 179, 0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-brand-text {
            background: linear-gradient(90deg, #ff5100, #ff8040, #ffffff, #ff5100);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 6s ease infinite;
        }
        .ethereal-bg {
            background: radial-gradient(circle at 20% 30%, #1a1a1a 0%, transparent 50%),

                        radial-gradient(circle at 50% 50%, #121212 0%, #0a0a0a 100%);
            position: fixed;
            inset: 0;
            z-index: -1;
        }


        
        /* Enhanced Rotating Border Effect */
        @keyframes rotate-border {
            100% {
                transform: rotate(360deg);
            }
        }
        .rotating-border-container {
            position: relative;
            padding: 3px; /* Increased border thickness from 1px to 3px */
            overflow: hidden;
            border-radius: 1.5rem;
            z-index: 0;
            box-shadow: 0 0 25px rgba(255, 81, 0, 0.35); /* Added strong vibrant glow */
        }
        .rotating-border-container::before {
            content: '';
            position: absolute;
            width: 250%; /* Larger gradient sweep area */
            height: 250%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                transparent 35%,
                #ff5100 45%,
                #ff8040 50%, /* Added highlight for high contrast */
                #ff5100 55%,
                transparent 65%,
                transparent 100%
            );
            left: -75%;
            top: -75%;
            animation: rotate-border 3s linear infinite; /* Faster, more dynamic rotation */
            z-index: -2;
        }
        .rotating-border-container::after {
            content: '';
            position: absolute;
            inset: 3px; /* Match the new padding thickness */
            background: #121212;
            border-radius: calc(1.5rem - 3px);

<!--Go to Menu pop up when scroll down-->
<script>
window.addEventListener("scroll", function () {
    const scrollPosition = window.innerHeight + window.scrollY;
    const pageHeight = document.body.offsetHeight;

    const popup = document.getElementById("goToMenuPopup");

    if (!popup) return; // safety check

    // Show when user reaches near bottom (within 100px)
    if (scrollPosition >= pageHeight - 100) {
        popup.classList.remove("hidden");
    } else {
        popup.classList.add("hidden");
    }
});
</script>

                { id: 'ic3', name: 'Frooti', price: 6.50, desc: 'Vanilla & Chocolate • 5-10 mins', rating: '4.9 (1.1k)', img: 'Frooti.jpeg'},
                { id: 'ic4', name: 'Appy Fizz', price: 6.50, desc: 'Vanilla & Chocolate • 5-10 mins', rating: '4.9 (1.1k)', img: 'Appy Fizz.jpeg'},
                { id: 'ic5', name: 'Limca', price: 6.50, desc: 'Vanilla & Chocolate • 5-10 mins', rating: '4.9 (1.1k)', img: 'Limca.jpeg'}, 
                { id: 'ic6', name: 'Coca Cola', price: 6.50, desc: 'Vanilla & Chocolate • 5-10 mins', rating: '4.9 (1.1k)', img: 'Coca Cola.jpeg'}, 
                { id: 'ic6', name: 'Fenta', price: 6.50, desc: 'Vanilla & Chocolate • 5-10 mins', rating: '4.9 (1.1k)', img: 'Fenta.jpeg'}, 
                { id: 'ic6', name: 'Sprite', price: 6.50, desc: 'Vanilla & Chocolate • 5-10 mins', rating: '4.9 (1.1k)', img: 'Sprite.jpeg'}, 
                { id: 'ic6', name: 'Red Bull', price: 6.50, desc: 'Vanilla & Chocolate • 5-10 mins', rating: '4.9 (1.1k)', img: 'Red Bull.jpeg'} 
            ]
        };

        let cart = {};

        window.openProfileZoom = function() {
            profileZoomModal.classList.remove('hidden');
            profileZoomModal.classList.add('flex');
            setTimeout(() => {
                profileZoomModal.classList.add('opacity-100');
                profileZoomContent.classList.remove('scale-90');
                profileZoomContent.classList.add('scale-100');
            }, 10);
        };

        window.closeProfileZoom = function() {
            profileZoomModal.classList.remove('opacity-100');
            profileZoomContent.classList.remove('scale-100');
            profileZoomContent.classList.add('scale-90');
            setTimeout(() => {
                profileZoomModal.classList.add('hidden');
                profileZoomModal.classList.remove('flex');
            }, 300);
        };

        window.scrollToMenu = function() {
            document.getElementById('category-section').scrollIntoView({ behavior: 'smooth' });
        };

        function updateCartUI() {
            let totalCount = 0;
            let totalPrice = 0;
            
            Object.values(cart).forEach(item => {
                totalCount += item.qty;
                totalPrice += item.qty * item.price;
            });

            if (totalCount > 0) {
                orderBar.classList.remove('hidden');
                countText.textContent = `${totalCount} Item${totalCount > 1 ? 's' : ''}`;
                totalText.textContent = `₹${totalPrice.toFixed(2)}`;
                navBadge.textContent = totalCount;
                navBadge.classList.remove('hidden');
            } else {
                orderBar.classList.add('hidden');
                navBadge.classList.add('hidden');
                hideModal();
            }
        }

        function renderProductList(category) {
            sectionTitle.textContent = `Popular ${category}s`;
            const items = mockData[category] || [];
            
            productGrid.innerHTML = items.map(item => {
                const currentQty = cart[item.id]?.qty || 0;
                return `
                    <div class="bg-surface-container rounded-[1.5rem] overflow-hidden border border-outline-variant/10 group active:scale-[1.01] transition-transform duration-200" data-id="${item.id}">
                        <div class="h-48 w-full relative">
                            <img class="w-full h-full object-cover opacity-90" alt="${item.name}" src="${item.img}"/>
                        </div>
                        <div class="p-md">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h4 class="font-headline-md text-headline-md text-on-surface">${item.name}</h4>
                                    <p class="text-body-sm text-secondary">${item.desc}</p>
                                </div>
                                <span class="text-primary font-bold text-headline-md">₹${item.price.toFixed(2)}</span>
                            </div>
                            <div class="cart-control-container">
                                ${currentQty > 0 ? renderQtySelector(item.id, currentQty) : `<button onclick="addToCart('${item.id}', '${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.img}')" class="w-full bg-primary text-on-primary py-1 rounded-xl font-label-md active:scale-95 transition-all shadow-lg shadow-primary/20">Add to Cart</button>`}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderQtySelector(id, qty) {
            return `
                <div class="flex items-center justify-between w-full bg-primary text-on-primary rounded-xl overflow-hidden h-[48px] shadow-lg shadow-primary/30">
                    <button onclick="updateQty('${id}', -1)" class="p-3 hover:bg-black/20 transition-colors flex items-center justify-center flex-1">
                        <span class="material-symbols-outlined">remove</span>
                    </button>
                    <span class="font-bold flex-1 text-center text-on-primary">${qty}</span>
                    <button onclick="updateQty('${id}', 1)" class="p-3 hover:bg-black/20 transition-colors flex items-center justify-center flex-1">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
            `;
        }

        window.addToCart = function(id, name, price, img) {
            cart[id] = { id, name, price, img, qty: 1 };
            updateCartUI();
            refreshProductCard(id);
        };

        window.updateQty = function(id, delta) {
            if (!cart[id]) return;
            cart[id].qty += delta;
            if (cart[id].qty <= 0) {
                delete cart[id];
            }
            updateCartUI();
            refreshProductCard(id);
            if (orderModal.classList.contains('flex')) {
                renderModalItems();
            }
        };

        function refreshProductCard(id) {
            const card = document.querySelector(`[data-id="${id}"]`);
            if (!card) return;
            const container = card.querySelector('.cart-control-container');
            const item = cart[id];
            if (item) {
                container.innerHTML = renderQtySelector(id, item.qty);
            } else {
                let product = null;
                for (let cat in mockData) {
                    product = mockData[cat].find(p => p.id === id);
                    if (product) break;
                }
                container.innerHTML = `<button onclick="addToCart('${id}', '${product.name.replace(/'/g, "\\'")}', ${product.price}, '${product.img}')" class="w-full bg-primary text-on-primary py-1 rounded-xl font-label-md active:scale-95 transition-all shadow-lg shadow-primary/20">Add to Cart</button>`;
            }
        }

        function renderModalItems() {
            const items = Object.values(cart);
            if (items.length === 0) {
                hideModal();
                return;
            }

            let totalPrice = 0;
            orderItemsList.innerHTML = items.map(item => {
                const subtotal = item.qty * item.price;
                totalPrice += subtotal;
                return `
                    <div class="flex gap-md items-center py-sm border-b border-outline-variant/10 last:border-0">
                        <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover border border-outline-variant/10" alt="${item.name}">
                        <div class="flex-1">
                            <h4 class="font-label-md text-on-surface">${item.name}</h4>
                            <p class="text-body-sm text-secondary">₹${item.price.toFixed(2)} x ${item.qty}</p>
                        </div>
                        <div class="flex items-center bg-surface-container-high rounded-lg border border-outline-variant/10">
                            <button onclick="updateQty('${item.id}', -1)" class="p-1 text-primary">
                                <span class="material-symbols-outlined text-[20px]">remove</span>
                            </button>
                            <span class="px-2 font-bold text-sm text-on-surface">${item.qty}</span>
                            <button onclick="updateQty('${item.id}', 1)" class="p-1 text-primary">
                                <span class="material-symbols-outlined text-[20px]">add</span>
                            </button>
                        </div>
                        <div class="text-right ml-2 min-w-[60px]">
                            <span class="font-bold text-on-surface">₹${subtotal.toFixed(2)}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            modalTotalPrice.textContent = `₹${totalPrice.toFixed(2)}`;
        }

        function showModal() {
            if (Object.keys(cart).length === 0) return;
            renderModalItems();
            orderModal.classList.remove('hidden');
            orderModal.classList.add('flex');
            setTimeout(() => {
                orderModal.classList.remove('opacity-0');
                orderModalContent.classList.remove('translate-y-full');
                orderModalContent.classList.add('translate-y-0');
            }, 10);
        }

        window.hideModal = function() {
            orderModalContent.classList.remove('translate-y-0');
            orderModalContent.classList.add('translate-y-full');
            setTimeout(() => {
                orderModal.classList.add('hidden');
                orderModal.classList.remove('flex');
            }, 300);
        }

        function updateGreetingAndClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const clockElement = document.getElementById('live-clock');
            if (clockElement) clockElement.textContent = `${String(hours).padStart(2, '0')}:${minutes}:${seconds}`;

            const greetingElement = document.getElementById('greeting-text');
            if (greetingElement) {
                let message = '';
                if (hours < 12) message = 'Good Morning ☀️🌅';
                else if (hours < 18) message = 'Good Afternoon 🌤️😊';
                else message = 'Good Evening 🌙✨';
                greetingElement.textContent = message;
            }
        }

        setInterval(updateGreetingAndClock, 1000);
        updateGreetingAndClock();

        categories.forEach(item => {
            item.addEventListener('click', function() {
                const category = this.getAttribute('data-category');
                categories.forEach(el => {
                    el.querySelector('.category-icon').classList.remove('bg-primary/20', 'active-glow', 'border-primary/30');
                    el.querySelector('.category-icon').classList.add('bg-surface-container-high', 'border-outline-variant/10');
                    el.querySelector('.category-label').classList.remove('text-primary');
                    el.querySelector('.category-label').classList.add('text-secondary');
                });
                this.querySelector('.category-icon').classList.remove('bg-surface-container-high', 'border-outline-variant/10');
                this.querySelector('.category-icon').classList.add('bg-primary/20', 'active-glow', 'border-primary/30');
                this.querySelector('.category-label').classList.remove('text-secondary');
                this.querySelector('.category-label').classList.add('text-primary');
                renderProductList(category);
            });
        });

        orderBar.addEventListener('click', showModal);
        orderModal.addEventListener('click', (e) => {
            if (e.target === orderModal) hideModal();
        });
        profileZoomModal.addEventListener('click', (e) => {
            if (e.target === profileZoomModal) closeProfileZoom();
        });

        renderProductList('Burger');
    </script>
</body></html>
